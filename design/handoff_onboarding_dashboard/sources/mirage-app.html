<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mirage</title>
<link rel="stylesheet" href="mirage.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="DataTable.jsx"></script>
<script type="text/babel" src="Pieces.jsx"></script>
<script type="text/babel">
const ROWS_OLD = [
  { id: 'crn:v1:bluemix:public:watson:us-south:...0a3c', name: 'watson-prod-01', status: 'active', statusLabel: 'Active', region: 'us-south', created: '2 days ago' },
  { id: 'crn:v1:bluemix:public:cloud-object-storage:global:...e81f', name: 'storage-bucket-primary', status: 'active', statusLabel: 'Active', region: 'global', created: '5 days ago' },
  { id: 'crn:v1:bluemix:public:qradar:us-east:...77bd', name: 'qradar-log-ingest', status: 'failed', statusLabel: 'Failed', region: 'us-east', created: '1 hr ago' },
  { id: 'crn:v1:bluemix:public:kubernetes:eu-de:...9c12', name: 'k8s-frankfurt', status: 'provisioning', statusLabel: 'Provisioning', region: 'eu-de', created: '12 min ago' },
  { id: 'crn:v1:bluemix:public:db2:jp-tok:...4f02', name: 'db2-tokyo-warehouse', status: 'active', statusLabel: 'Active', region: 'jp-tok', created: '3 weeks ago' },
  { id: 'crn:v1:bluemix:public:functions:us-south:...a1b9', name: 'carbon-webhook-fn', status: 'paused', statusLabel: 'Paused', region: 'us-south', created: '1 month ago' },
];

function App() {
  const saved = typeof localStorage !== 'undefined' ? localStorage.getItem('mirage-page') : null;
  const [page, setPageRaw] = React.useState(saved || 'schemas');
  const setPage = (p) => { setPageRaw(p); try { localStorage.setItem('mirage-page', p); } catch {} };
  const [creating, setCreating] = React.useState(false);
  const openCreate = () => setCreating(true);
  const closeCreate = () => setCreating(false);

  let body = null;
  if (page === 'schemas')        body = <SchemasPage    onCreate={openCreate} />;
  else if (page === 'graph')     body = <GraphPage      onCreate={openCreate} />;
  else if (page === 'sets')      body = <SetsPage       onCreate={openCreate} />;
  else if (page === 'history')   body = <HistoryPage />;
  else if (page === 'connectors')body = <ConnectorsPage />;
  else if (page === 'fakers')    body = <FakersPage />;
  else if (page === 'settings')  body = <SettingsPage />;

  return (
    <>
      <MShell page={page} setPage={setPage}>{body}</MShell>
      {creating && <CreateSchemaSheet onClose={closeCreate} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
