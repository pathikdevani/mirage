# Mirage local infra — dependencies only.
# Application services (bff, workspace-svc, generation-worker, export-svc, web)
# run on the host via Nx (`pnpm dev`). See TECH_ARCHITECHRE.md §7.1.
#
# Bring up:    docker compose -f infra/docker-compose.yml up -d
# Tear down:   docker compose -f infra/docker-compose.yml down
# Wipe data:   docker compose -f infra/docker-compose.yml down -v

name: mirage

services:
  mongo:
    image: mongo:7
    container_name: mirage-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: mirage
      MONGO_INITDB_ROOT_PASSWORD: mirage
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: mirage-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    container_name: mirage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    environment:
      MINIO_ROOT_USER: miragedev
      MINIO_ROOT_PASSWORD: miragedev-secret
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: ensures the `mirage` bucket exists on first boot.
  minio-bootstrap:
    image: minio/mc
    container_name: mirage-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 miragedev miragedev-secret &&
        mc mb --ignore-existing local/mirage &&
        echo 'bucket mirage ready'
      "
    restart: 'no'

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: mirage-keycloak
    restart: unless-stopped
    command: ['start-dev', '--import-realm']
    ports:
      - '8080:8080'
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'exec 3<>/dev/tcp/localhost/9000 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && cat <&3 | grep -q "UP"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mailhog:
    image: mailhog/mailhog
    container_name: mirage-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI

volumes:
  mongo-data:
  redis-data:
  minio-data:
  keycloak-data:
