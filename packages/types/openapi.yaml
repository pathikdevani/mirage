openapi: 3.1.0
info:
  title: Mirage API
  version: 0.0.0
  description: |
    The single OpenAPI spec for Mirage. Lives in `@mirage/types` so it can
    be consumed both by the BFF (for route shape) and the React SPA (for the
    typed client). Generated TypeScript types land in `openapi.generated.ts`
    via `pnpm gen:openapi`, which is wired to `postinstall`.

servers:
  - url: http://localhost:4000

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Liveness probe (unauthenticated)
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /me:
    get:
      summary: Current user's identity and org memberships
      description: |
        Returns the signed-in user plus the orgs they belong to (derived from
        Keycloak group membership). Does not require the `X-Mirage-Org` header
        — clients call this on app load to populate the org switcher before
        any org has been chosen.
      operationId: getMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces:
    get:
      summary: List the current org's Workspaces
      operationId: listWorkspaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a Workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Workspace by id
      operationId: getWorkspace
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wsId}/schemas:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: query
        name: key
        required: false
        schema: { type: string }
        description: Optional exact-match filter on the schema key. Returns a 0- or 1-element array.
    get:
      summary: List Schemas in a Workspace
      operationId: listSchemas
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schema'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a Schema in a Workspace
      operationId: createSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchemaBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wsId}/schemas/{id}:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Schema by id
      operationId: getSchema
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a Schema
      operationId: updateSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchemaBody'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Delete a Schema
      operationId: deleteSchema
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      additionalProperties: false
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string }

    MeResponse:
      type: object
      required: [userId, allOrgIds]
      additionalProperties: false
      properties:
        userId: { type: string }
        email: { type: string }
        allOrgIds:
          type: array
          items: { type: string }

    Workspace:
      type: object
      required: [id, orgId, name, createdBy, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        orgId: { type: string }
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateWorkspaceBody:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }

    SchemaProp:
      type: object
      required: [name, type, required]
      additionalProperties: false
      properties:
        name: { type: string }
        type:
          type: string
          enum: [string, number, integer, boolean, object, array]
        format:
          type: string
          enum: [uuid, email, date, date-time]
        required: { type: boolean }
        faker: { type: string }
        fields:
          type: array
          items:
            $ref: '#/components/schemas/SchemaProp'
        items:
          $ref: '#/components/schemas/SchemaProp'

    Schema:
      type: object
      required:
        - id
        - workspaceId
        - orgId
        - key
        - name
        - description
        - color
        - icon
        - tags
        - properties
        - createdBy
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id: { type: string }
        workspaceId: { type: string }
        orgId: { type: string }
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          items:
            $ref: '#/components/schemas/SchemaProp'
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateSchemaBody:
      type: object
      required: [key, name, color, icon, tags, properties]
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SchemaProp'

    UpdateSchemaBody:
      type: object
      required: [key, name, color, icon, tags, properties, expectedUpdatedAt]
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SchemaProp'
        expectedUpdatedAt: { type: string, format: date-time }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        code: { type: string }
        detail: {}

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
