openapi: 3.1.0
info:
  title: Mirage API
  version: 0.0.0
  description: |
    The single OpenAPI spec for Mirage. Lives in `@mirage/types` so it can
    be consumed both by the BFF (for route shape) and the React SPA (for the
    typed client). Generated TypeScript types land in `openapi.generated.ts`
    via `pnpm gen:openapi`, which is wired to `postinstall`.

servers:
  - url: http://localhost:4000

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Liveness probe (unauthenticated)
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /me:
    get:
      summary: Current user's identity and org memberships
      description: |
        Returns the signed-in user plus the orgs they belong to (derived from
        Keycloak group membership). Does not require the `X-Mirage-Org` header
        — clients call this on app load to populate the org switcher before
        any org has been chosen.
      operationId: getMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces:
    get:
      summary: List the current org's Workspaces
      operationId: listWorkspaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a Workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Workspace by id
      operationId: getWorkspace
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wsId}/schemas:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: query
        name: key
        required: false
        schema: { type: string }
        description: Optional exact-match filter on the schema key. Returns a 0- or 1-element array.
    get:
      summary: List Schemas in a Workspace
      operationId: listSchemas
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schema'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a Schema in a Workspace
      operationId: createSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchemaBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wsId}/schemas/{id}:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Schema by id
      operationId: getSchema
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a Schema
      operationId: updateSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchemaBody'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Delete a Schema
      operationId: deleteSchema
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wsId}/sets:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
    get:
      summary: List Sets in a Workspace
      operationId: listSets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Set' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Create a Set in a Workspace
      operationId: createSet
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSetBody' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Set' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workspaces/{wsId}/sets/{id}:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Set by id
      operationId: getSet
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Set' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Update a Set
      operationId: updateSet
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSetBody' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Set' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      summary: Delete a Set
      operationId: deleteSet
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workspaces/{wsId}/sets/{id}/edges:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Computed cross-schema reference edges for this Set
      operationId: getSetEdges
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SetEdge' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workspaces/{wsId}/custom-functions:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
    get:
      summary: List Custom Functions in a Workspace
      operationId: listCustomFunctions
      parameters:
        - in: query
          name: usage
          required: false
          schema: { type: string, enum: [valueGenerator, strategy, both] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CustomFunction' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Create a Custom Function
      operationId: createCustomFunction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCustomFunctionBody' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomFunction' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workspaces/{wsId}/custom-functions/{id}:
    parameters:
      - in: path
        name: wsId
        required: true
        schema: { type: string }
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a Custom Function by id
      operationId: getCustomFunction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomFunction' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Update a Custom Function
      operationId: updateCustomFunction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCustomFunctionBody' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomFunction' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      summary: Delete a Custom Function
      operationId: deleteCustomFunction
      responses:
        '204': { description: Deleted }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      additionalProperties: false
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string }

    MeResponse:
      type: object
      required: [userId, allOrgIds]
      additionalProperties: false
      properties:
        userId: { type: string }
        email: { type: string }
        allOrgIds:
          type: array
          items: { type: string }

    Workspace:
      type: object
      required: [id, orgId, name, createdBy, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id: { type: string }
        orgId: { type: string }
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateWorkspaceBody:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }

    SchemaProp:
      type: object
      required: [name, type, required]
      additionalProperties: false
      properties:
        name: { type: string }
        type:
          type: string
          enum: [string, number, integer, boolean, object, array]
        format:
          type: string
          enum: [uuid, email, date, date-time]
        required: { type: boolean }
        faker: { type: string }
        fields:
          type: array
          items:
            $ref: '#/components/schemas/SchemaProp'
        items:
          $ref: '#/components/schemas/SchemaProp'

    Schema:
      type: object
      required:
        - id
        - workspaceId
        - orgId
        - key
        - name
        - description
        - color
        - icon
        - tags
        - properties
        - createdBy
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id: { type: string }
        workspaceId: { type: string }
        orgId: { type: string }
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          items:
            $ref: '#/components/schemas/SchemaProp'
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateSchemaBody:
      type: object
      required: [key, name, color, icon, tags, properties]
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SchemaProp'

    UpdateSchemaBody:
      type: object
      required: [key, name, color, icon, tags, properties, expectedUpdatedAt]
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SchemaProp'
        expectedUpdatedAt: { type: string, format: date-time }

    Strategy:
      oneOf:
        - type: object
          required: [type]
          additionalProperties: false
          properties:
            type: { type: string, enum: ['1:1'] }
        - type: object
          required: [type]
          additionalProperties: false
          properties:
            type: { type: string, enum: ['random'] }
            allowDuplicates: { type: boolean }
        - type: object
          required: [type]
          additionalProperties: false
          properties:
            type: { type: string, enum: ['evenSplit'] }
        - type: object
          required: [type, functionId]
          additionalProperties: false
          properties:
            type: { type: string, enum: ['custom'] }
            functionId: { type: string }

    StrategyOverride:
      type: object
      required: [schemaKey, fieldPath, strategy]
      additionalProperties: false
      properties:
        schemaKey: { type: string }
        fieldPath: { type: string }
        strategy: { $ref: '#/components/schemas/Strategy' }

    SetSchemaInclusion:
      type: object
      required: [schemaKey, count]
      additionalProperties: false
      properties:
        schemaKey: { type: string }
        count: { type: integer, minimum: 0, maximum: 10000000 }

    SetOutputConfig:
      type: object
      required: [format, locale, workerPool]
      additionalProperties: false
      properties:
        format: { type: string, enum: [json, ndjson, csv, sql, parquet] }
        locale: { type: string, minLength: 2, maxLength: 16 }
        workerPool: { type: integer, minimum: 1, maximum: 64 }

    Set:
      type: object
      required:
        - id
        - workspaceId
        - orgId
        - key
        - name
        - description
        - color
        - icon
        - tags
        - salt
        - schemas
        - strategies
        - output
        - createdBy
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id: { type: string }
        workspaceId: { type: string }
        orgId: { type: string }
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        salt: { type: string, minLength: 1, maxLength: 64 }
        schemas:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/SetSchemaInclusion' }
        strategies:
          type: array
          items: { $ref: '#/components/schemas/StrategyOverride' }
        output: { $ref: '#/components/schemas/SetOutputConfig' }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateSetBody:
      type: object
      required: [key, name, color, icon, tags, salt, schemas, strategies, output]
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        salt: { type: string, minLength: 1, maxLength: 64 }
        schemas:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/SetSchemaInclusion' }
        strategies:
          type: array
          items: { $ref: '#/components/schemas/StrategyOverride' }
        output: { $ref: '#/components/schemas/SetOutputConfig' }

    UpdateSetBody:
      type: object
      required:
        - key
        - name
        - color
        - icon
        - tags
        - salt
        - schemas
        - strategies
        - output
        - expectedUpdatedAt
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{0,39}$'
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
        color:
          type: string
          enum: [violet, cyan, emerald, amber, rose, slate]
        icon: { type: string }
        tags:
          type: array
          items: { type: string }
        salt: { type: string, minLength: 1, maxLength: 64 }
        schemas:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/SetSchemaInclusion' }
        strategies:
          type: array
          items: { $ref: '#/components/schemas/StrategyOverride' }
        output: { $ref: '#/components/schemas/SetOutputConfig' }
        expectedUpdatedAt: { type: string, format: date-time }

    SetEdge:
      type: object
      required: [fromSchemaKey, fromFieldPath, toSchemaKey, cardinality]
      additionalProperties: false
      properties:
        fromSchemaKey: { type: string }
        fromFieldPath: { type: string }
        toSchemaKey: { type: string }
        cardinality:
          type: string
          enum: [one, many]

    CustomFunction:
      type: object
      required:
        - id
        - workspaceId
        - orgId
        - name
        - description
        - usage
        - source
        - createdBy
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id: { type: string }
        workspaceId: { type: string }
        orgId: { type: string }
        name:
          type: string
          pattern: '^[a-zA-Z_$][a-zA-Z0-9_$]{0,63}$'
        description: { type: string, maxLength: 500 }
        usage: { type: string, enum: [valueGenerator, strategy, both] }
        source: { type: string, minLength: 1, maxLength: 20000 }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateCustomFunctionBody:
      type: object
      required: [name, usage, source]
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z_$][a-zA-Z0-9_$]{0,63}$'
        description: { type: string, maxLength: 500 }
        usage: { type: string, enum: [valueGenerator, strategy, both] }
        source: { type: string, minLength: 1, maxLength: 20000 }

    UpdateCustomFunctionBody:
      type: object
      required: [name, usage, source, expectedUpdatedAt]
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z_$][a-zA-Z0-9_$]{0,63}$'
        description: { type: string, maxLength: 500 }
        usage: { type: string, enum: [valueGenerator, strategy, both] }
        source: { type: string, minLength: 1, maxLength: 20000 }
        expectedUpdatedAt: { type: string, format: date-time }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        code: { type: string }
        detail: {}

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
